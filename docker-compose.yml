services:
  postgres:
    image: postgres:15-alpine
    container_name: kei-postgres
    environment:
      POSTGRES_DB: kei
      POSTGRES_USER: kei
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kei_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kei -d kei"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kei-backend
    environment:
      DATABASE_URL: postgres://kei:${POSTGRES_PASSWORD:-kei_dev_password}@postgres:5432/kei?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-production}
      PORT: 8080
      ENV: ${ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kei-frontend
    environment:
      API_URL: ${API_URL:-http://localhost:8080}
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
