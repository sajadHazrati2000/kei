services:
  postgres:
    image: postgres:15-alpine
    container_name: kei-postgres
    environment:
      POSTGRES_DB: kei
      POSTGRES_USER: kei
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kei_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kei -d kei"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kei-backend
    environment:
      DATABASE_URL: postgres://kei:${POSTGRES_PASSWORD:-kei_dev_password}@postgres:5432/kei?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-production}
      PORT: 8080
      ENV: ${ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Development frontend: ng serve with hot-reload via volume mount.
  # File watching uses --poll for cross-platform compatibility on
  # Docker Desktop (Windows/Mac host filesystems).
  # Production build: use docker-compose.prod.yml which builds the nginx image.
  frontend:
    image: node:20-alpine
    container_name: kei-frontend
    working_dir: /app
    command: >
      sh -c "npm ci --prefer-offline --silent &&
             npx ng serve --host 0.0.0.0 --port 4200 --poll 1000 --disable-host-check"
    volumes:
      - ./frontend:/app
      - kei_frontend_nm:/app/node_modules
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  kei_frontend_nm:
